name: Bootstrap signing keystore

# One-time: generates a STABLE keystore and commits it to signing/wedo-stable.keystore.
# The Android APK workflow then signs every build with it, so updates install in
# place (no more uninstall/reinstall). Uses the standard debug credentials
# (alias androiddebugkey / storepass android / keypass android) so it's a drop-in
# replacement for the keystore Expo prebuild generates.
#
# Run it ONCE from the Actions tab (or via `gh workflow run bootstrap-keystore.yml`).
# It is idempotent: if the keystore already exists, it does nothing.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate the stable keystore if missing
        run: |
          KS=signing/wedo-stable.keystore
          if [ -f "$KS" ]; then
            echo "Keystore already exists — nothing to do."
            exit 0
          fi
          mkdir -p signing
          keytool -genkeypair -v -keystore "$KS" \
            -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=WeDo Test, O=Atlas Studio, C=CI"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "$KS"
          git commit -m "chore(ci): stable signing keystore for in-place APK updates"
          git push
          echo "Stable keystore generated and committed."
