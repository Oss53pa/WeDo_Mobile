name: Android APK

# Builds a standalone, installable WeDo APK on GitHub's runner (which has the
# Android SDK that local machines may lack — no Expo account / EAS login needed).
# The native android/ project is generated on the fly via Expo CNG prebuild, so
# nothing native needs to be committed. The APK is published two ways:
#   1) as a run artifact (wedo-apk), and
#   2) attached to a permanent `android-latest` release → stable download link.

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'index.js'
      - 'app.json'
      - 'package.json'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # RN 0.75 sits between Expo SDK 51/52 — align the whole native dependency
      # set (react-native, reanimated, screens, svg…) to the pinned Expo SDK so
      # the generated Gradle project is internally consistent.
      - name: Align native deps to the Expo SDK
        run: npx expo install --fix

      - name: Generate the native Android project (CNG prebuild)
        run: npx expo prebuild --platform android --no-install --clean

      # react-native-vector-icons ships a gradle script that copies its .ttf
      # fonts into the APK; Expo prebuild doesn't wire it, so add it ourselves.
      - name: Bundle vector-icon fonts
        run: |
          GRADLE=android/app/build.gradle
          if ! grep -q "react-native-vector-icons/fonts.gradle" "$GRADLE"; then
            echo 'apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")' >> "$GRADLE"
          fi

      # Sign every build with ONE stable keystore so updates install in place
      # (no uninstall/reinstall). Its creds match the debug signingConfig that the
      # release buildType uses, so it's a drop-in replacement — no Gradle edits.
      # Generate it once via the "Bootstrap signing keystore" workflow.
      - name: Use the stable signing keystore
        run: |
          if [ -f signing/wedo-stable.keystore ]; then
            cp signing/wedo-stable.keystore android/app/debug.keystore
            echo "✓ Release signed with the committed stable keystore."
          else
            echo "::warning::No signing/wedo-stable.keystore yet — run the 'Bootstrap signing keystore' workflow once so APK updates install in place."
          fi

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/wedo.apk

      - uses: actions/upload-artifact@v4
        with:
          name: wedo-apk
          path: dist/wedo.apk
          if-no-files-found: error

      # Stable download link that NEVER 404s during a build: instead of swapping
      # the asset on a single reused release (which leaves a gap mid-upload), each
      # build publishes its OWN release marked `make_latest: true`. GitHub flips
      # /releases/latest/download/wedo.apk atomically only once the new release is
      # fully published — the old asset stays served until then.
      #   STABLE LINK → https://github.com/Oss53pa/WeDo_Mobile/releases/latest/download/wedo.apk
      - name: Read app version
        id: ver
        run: echo "v=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Publish versioned release (atomic latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}-b${{ github.run_number }}
          name: WeDo ${{ steps.ver.outputs.v }} (build ${{ github.run_number }})
          body: |
            APK WeDo généré par la CI GitHub. Lien stable (ne casse jamais) :
            https://github.com/Oss53pa/WeDo_Mobile/releases/latest/download/wedo.apk

            Backend Supabase de production : séquestre (cantonnement EME), registre
            infalsifiable SHA-256, score de fiabilité, paliers P0→P2.
            Installation Android : autoriser les sources inconnues, puis ouvrir wedo.apk.
          files: dist/wedo.apk
          prerelease: false
          make_latest: true

      - name: Prune old builds (keep the 3 most recent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 60 --json tagName,createdAt \
            -q '[.[] | select(.tagName | startswith("v"))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r t; do
                [ -n "$t" ] && gh release delete "$t" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
              done
