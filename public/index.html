<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeDo - Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Dosis:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Material Design Icons Font from CDN -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <style>
    /* MaterialCommunityIcons Font from CDN */
    @font-face {
      font-family: 'Material Design Icons';
      src: url('https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    /* Alias for compatibility */
    @font-face {
      font-family: 'MaterialCommunityIcons';
      src: url('https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'MaterialDesignIcons';
      src: url('https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #FAFAFA;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Dosis', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }

    .phone-container {
      position: relative;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: #1c1c1e;
      border-radius: 55px;
      padding: 12px;
      box-shadow:
        0 0 0 3px #2c2c2e,
        0 0 0 6px #1c1c1e,
        0 50px 100px rgba(0, 0, 0, 0.5),
        inset 0 0 10px rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #1c1c1e;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }

    .phone-frame::after {
      content: '';
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 6px;
      background: #2c2c2e;
      border-radius: 3px;
    }

    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 34px;
      background: #1c1c1e;
      border-radius: 0 0 24px 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 8px;
    }

    .camera {
      width: 12px;
      height: 12px;
      background: #2c2c2e;
      border-radius: 50%;
      border: 2px solid #3c3c3e;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    #root > div {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
    }

    #root > div > div {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
    }

    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 3px;
      z-index: 30;
    }

    .title {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      color: #3A3A3A;
      font-family: 'Grand Hotel', cursive;
      font-size: 42px;
      font-weight: 400;
      text-align: center;
      white-space: nowrap;
    }

    .subtitle {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      color: #8A8A8A;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    /* Responsive */
    @media (max-height: 900px) {
      .phone-frame {
        transform: scale(0.85);
        transform-origin: center center;
      }
    }

    @media (max-height: 750px) {
      .phone-frame {
        transform: scale(0.7);
      }
    }

    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background: #FFFFFF;
      color: #3A3A3A;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #F2F2F2;
      border-top-color: #EF762D;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="phone-container">
    <div class="title">WeDo</div>
    <div class="phone-frame">
      <div class="notch">
        <div class="camera"></div>
      </div>
      <div class="phone-screen">
        <div id="root">
          <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Chargement...</div>
          </div>
        </div>
        <div class="home-indicator"></div>
      </div>
    </div>
    <div class="subtitle">Apercu Web - Mode Developpement</div>
  </div>
</body>
</html>
